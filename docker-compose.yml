services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SHOPIFY_APP_URL=https://shopify-chat-agent-mcp.onrender.com
      - SHOPIFY_API_KEY=1a5b5a5a8f6fe7c8b54fbabff7b14bdc
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      # AWS keys will be read from environment
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=us-east-1
    volumes:
      # If using SQLite, persist the database file
      - db-data:/app/prisma
    restart: always

volumes:
  db-data:
